name: Firebase Hosting Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: DYK website/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: DYK website

      - name: Build app
        run: npm run build
        working-directory: DYK website

      - name: Decode service account key (base64)
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ACSUSJ_WEB_B64 != '' }}
        shell: bash
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_ACSUSJ_WEB_B64 }}" | base64 -d > "$RUNNER_TEMP/gcp-key.json"

      - name: Authenticate to Google Cloud (base64 secret)
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ACSUSJ_WEB_B64 != '' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_file_path: ${{ runner.temp }}/gcp-key.json

      - name: Authenticate to Google Cloud (raw JSON secret)
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ACSUSJ_WEB_B64 == '' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ACSUSJ_WEB }}

      - name: Deploy to Firebase Hosting site dyk-acsusj
        run: npx firebase-tools deploy --project acsusj-web --only hosting:dyk-acsusj --config "DYK website/firebase.json" --non-interactive